version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gscores-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gscores
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gscores']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: gscores-api
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gscores?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/gscores?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    container_name: gscores-web
    restart: always
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  postgres_data: